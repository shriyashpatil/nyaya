
services:
  # -------------------------------------------------------
  # PostgreSQL Database
  # -------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: nyaya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nyaya_db
      POSTGRES_USER: nyaya_user
      POSTGRES_PASSWORD: nyaya_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyaya_user -d nyaya_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nyaya-network

  # -------------------------------------------------------
  # Spring Boot Backend
  # -------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nyaya-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nyaya_db
      DB_USER: nyaya_user
      DB_PASSWORD: nyaya_pass
      # Claude API - set this in .env file
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      # Frontend URL for CORS
      FRONTEND_URL: http://localhost:3000
      # JVM Options
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - nyaya-network

  # -------------------------------------------------------
  # React Frontend
  # -------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nyaya-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nyaya-network

# -------------------------------------------------------
# Networks & Volumes
# -------------------------------------------------------
networks:
  nyaya-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
